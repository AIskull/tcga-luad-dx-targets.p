name: Repo secret/data hygiene

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run repository hygiene checks
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking for forbidden tracked paths..."
          if git ls-files | rg -E '^data/|^results/(bio_runs/|tables/de_sensitivity_tss_(deseq2|edger|limma)/)'; then
            echo "❌ Forbidden tracked paths found. These should stay private and untracked:"
            git ls-files | rg -E '^data/|^results/(bio_runs/|tables/de_sensitivity_tss_(deseq2|edger|limma)/)'
            exit 1
          fi

          echo "Checking for common secret-like patterns in tracked files..."
          if git grep -I -n -E '(?i)(api[_-]?key|API[_-]?KEY|access[_-]?token|client[_-]?secret|private[_-]?key|BEGIN (RSA|OPENSSH|EC) PRIVATE KEY|BEGIN PRIVATE KEY|authorization\s*[:=]\s*Bearer|password\s*[:=]\s*[\"\']\S+[\"\']|oauth\s*token|X-API-KEY)' -- . >/tmp/secret_hits.txt 2>/dev/null; then
            if [[ -s /tmp/secret_hits.txt ]]; then
              echo "❌ Secret-like patterns found in tracked files:"
              cat /tmp/secret_hits.txt
              exit 1
            fi
          fi

          echo "✅ Hygiene checks passed."
